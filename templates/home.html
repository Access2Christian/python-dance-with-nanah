{% extends "layout.html" %}
{% block content %}
<div class="mb-5">
    <h2 class="fw-bold">Welcome, <span class="text-primary">{{ user.username }}</span></h2>
    <p class="text-muted">Complete your dancer profile to appear in the world-class roster.</p>
</div>

<form method="POST" class="row g-4">
    <div class="col-md-7">
        <label class="form-label fw-bold small text-uppercase">Full Name</label>
        <input type="text" name="full_name" class="form-control form-control-lg border-0 bg-light" value="{{ user.full_name or '' }}" required>
    </div>
    <div class="col-md-5">
        <label class="form-label fw-bold small text-uppercase">Age</label>
        <input type="number" name="age" class="form-control form-control-lg border-0 bg-light" value="{{ user.age or '' }}" required>
    </div>
    <div class="col-md-6">
        <label class="form-label fw-bold small text-uppercase">Course of Study</label>
        <input type="text" name="course" class="form-control border-0 bg-light" value="{{ user.course or '' }}" required>
    </div>
    <div class="col-md-6">
        <label class="form-label fw-bold small text-uppercase">Skills (Comma separated)</label>
        <input type="text" name="skills" class="form-control border-0 bg-light" placeholder="Python, SQL, AWS" value="{{ user.skills or '' }}" required>
    </div>
    <div class="col-12">
        <label class="form-label fw-bold small text-uppercase">Your Story (The Line)</label>
        <textarea name="story" class="form-control border-0 bg-light" rows="4" placeholder="Tell us your journey into tech..." required>{{ user.story or '' }}</textarea>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-dark btn-lg w-100 shadow-sm">PUBLISH MY PROFILE</button>
    </div>
</form>
{% endblock %}
